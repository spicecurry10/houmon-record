<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="訪問記録">
<title>訪問記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#2E7D32;--gl:#E8F5E9;--red:#FF6B6B;--tx:#1A1A2E;--sub:#6B7280;--bd:#E5E7EB;--bg:#F5F7FA;--bl:#1565C0;--bll:#E3F2FD;}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--tx);max-width:430px;margin:0 auto;min-height:100vh;}
.pg{display:none;flex-direction:column;min-height:100vh;}
.pg.on{display:flex;}
.hd{background:var(--g);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hd-ttl{flex:1;font-size:18px;font-weight:700;}
.hd-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.hd-btn-cal{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.hd-btn-day{background:#fff;border:none;color:var(--g);font-size:16px;font-weight:800;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;box-shadow:0 2px 4px rgba(0,0,0,.15);}
.bk-btn{background:transparent;border:none;color:#fff;font-size:30px;cursor:pointer;padding:0 4px;font-family:inherit;line-height:1;}
.sb{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--bd);}
.sb input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;}
.ab{display:none;gap:8px;padding:12px 16px;background:var(--gl);border-bottom:1px solid var(--bd);}
.ab input{flex:1;border:1.5px solid var(--g);border-radius:8px;padding:8px 12px;font-size:16px;outline:none;font-family:inherit;}
.btn-ok{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-no{background:transparent;color:var(--sub);border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;}
.lst{padding:8px 16px 80px;}
.empty{text-align:center;color:var(--sub);margin-top:80px;font-size:15px;padding:16px;}
.p-row{display:flex;align-items:center;margin-bottom:10px;gap:8px;}
.p-btn{flex:1;display:flex;align-items:center;gap:12px;background:#fff;border:none;border-radius:12px;padding:14px 16px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:left;font-family:inherit;}
.av{width:40px;height:40px;border-radius:20px;background:var(--g);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.p-nm{flex:1;font-size:16px;font-weight:600;color:var(--tx);}
.chv{font-size:22px;color:var(--sub);}
.d-btn{background:transparent;border:none;font-size:18px;cursor:pointer;padding:8px;color:var(--sub);}
.cpb{display:none;flex-wrap:wrap;gap:8px;padding:10px 16px;background:var(--gl);border-bottom:1px solid var(--bd);align-items:center;}
.cpb input[type=month]{flex:1;min-width:100px;border:1.5px solid var(--g);border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;color:var(--tx);outline:none;font-family:inherit;}
.btn-cp{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn-cp-red{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.m-lbl{font-size:12px;font-weight:700;color:var(--sub);padding:12px 0 6px;}
.r-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.r-dt{font-size:16px;font-weight:700;color:var(--g);margin-bottom:8px;}
.r-vt{font-size:13px;color:var(--tx);line-height:1.9;}
.r-mo-row{display:flex;align-items:flex-start;gap:8px;margin-top:6px;padding-top:8px;border-top:1px solid var(--bd);}
.r-mo{font-size:13px;color:var(--tx);line-height:1.6;flex:1;}
.r-cp{background:#E8F5E9;border:2px solid var(--g);color:var(--g);font-size:13px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:8px;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.r-acts{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);}
.r-edit{background:#EFF6FF;border:2px solid #2563EB;color:#2563EB;font-size:15px;font-weight:700;cursor:pointer;padding:10px 0;border-radius:10px;font-family:inherit;flex:1;}
.r-del{background:#FEF2F2;border:2px solid #EF4444;color:#EF4444;font-size:15px;font-weight:700;cursor:pointer;padding:10px 0;border-radius:10px;font-family:inherit;flex:1;}
.frm{padding:20px 16px;display:flex;flex-direction:column;gap:6px;}
.f-lbl{font-size:13px;font-weight:700;color:var(--sub);margin-top:10px;}
.f-in{border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:15px;background:#fff;outline:none;color:var(--tx);font-family:inherit;width:100%;}
.vb{background:#fff;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;}
.vr{display:flex;align-items:center;border-bottom:1px solid var(--bd);padding:0 14px;}
.vr:last-child{border-bottom:none;}
.vl{font-size:15px;font-weight:700;color:var(--g);width:70px;flex-shrink:0;}
.vr input{flex:1;border:none;outline:none;font-size:16px;padding:12px 0;background:transparent;color:var(--tx);font-family:inherit;}
textarea.f-in{resize:none;line-height:1.7;}
.btn-sv{background:var(--g);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;width:100%;font-family:inherit;box-shadow:0 4px 12px rgba(46,125,50,.35);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;}
.ov.on{display:flex;}
.dlg{background:#fff;border-radius:16px;padding:24px 20px 20px;width:85%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.dlg p{font-size:16px;font-weight:600;text-align:center;margin-bottom:20px;line-height:1.6;}
.dlg-bts{display:flex;gap:10px;}
.btn-dl-no{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-dl-ok{flex:1;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.dlg-rng{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.dlg-rng-sep{text-align:center;color:var(--sub);font-size:13px;}
.dlg-menu{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.dlg-menu button{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;font-size:15px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;text-align:left;}
.dlg-menu .ic{font-size:20px;}
.dlg-menu .sep{height:1px;background:var(--bd);margin:2px 0;}
.dlg-menu .sec-lbl{font-size:11px;font-weight:700;color:var(--sub);padding:4px 0 0;letter-spacing:.05em;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;display:none;}
.day-pick{padding:12px 16px;background:#fff;border-bottom:2px solid var(--g);display:flex;align-items:center;gap:10px;}
.day-pick input[type=date]{flex:1;border:1.5px solid var(--g);border-radius:10px;padding:9px 12px;font-size:16px;outline:none;font-family:inherit;color:var(--tx);background:#fff;}
.day-pick-lbl{font-size:13px;color:var(--sub);font-weight:700;white-space:nowrap;}
.day-today{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.day-empty{text-align:center;color:var(--sub);margin-top:80px;font-size:15px;padding:16px;}
.day-user-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.day-user-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--gl);border-bottom:1px solid var(--bd);}
.day-user-av{width:36px;height:36px;border-radius:18px;background:var(--g);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-user-nm{font-size:16px;font-weight:700;color:var(--tx);}
.day-rec{padding:12px 16px;}
.day-vt{font-size:13px;color:var(--tx);line-height:1.9;}
.day-mo{font-size:13px;color:var(--tx);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);}
.day-count-bar{padding:10px 16px;font-size:13px;font-weight:700;color:var(--bl);background:var(--bll);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;}
.day-count-txt{flex:1;}
.btn-day-cp{background:var(--bl);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.mic-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.btn-mic{background:var(--g);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-mic.rec{background:var(--red);}
.btn-mic.rec .mic-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;animation:mblink 1s step-end infinite;}
@keyframes mblink{50%{opacity:0;}}
.mic-st{font-size:12px;color:var(--sub);flex:1;}
.dict-ab{display:none;flex-direction:column;gap:8px;padding:12px 16px;background:var(--gl);border-bottom:1px solid var(--bd);}
.dict-ab-row{display:flex;align-items:center;gap:6px;}
.dict-ab-row input{flex:1;border:1.5px solid var(--g);border-radius:8px;padding:8px 10px;font-size:14px;outline:none;font-family:inherit;min-width:0;}
.dict-arrow{color:var(--sub);font-size:16px;flex-shrink:0;}
.dict-ab-btns{display:flex;gap:8px;}
.dict-entry{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:8px;}
.dict-from{font-size:13px;color:var(--sub);flex:1;word-break:break-all;}
.dict-arr{font-size:13px;color:var(--bd);flex-shrink:0;}
.dict-to{font-size:15px;font-weight:700;color:var(--tx);flex:1;word-break:break-all;}
.dict-del{background:transparent;border:none;font-size:18px;cursor:pointer;padding:4px 6px;color:var(--sub);flex-shrink:0;}
.dict-empty{text-align:center;color:var(--sub);margin-top:50px;font-size:14px;padding:16px;line-height:2;}
.dict-bar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--bd);}
.btn-dict-io{flex:1;background:var(--gl);border:1.5px solid var(--g);color:var(--g);border-radius:8px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-dict-imp{flex:1;background:var(--bll);border:1.5px solid var(--bl);color:var(--bl);border-radius:8px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- 画面1: 利用者一覧 -->
<div id="pg1" class="pg on">
  <div class="hd">
    <span class="hd-ttl">訪問記録</span>
    <button class="hd-btn-cal" id="btnSettings" title="バックアップ">⚙</button>
    <button class="hd-btn-day" id="btnGoDay" title="日別実施一覧"></button>
    <button class="hd-btn" id="btnShowAb">＋</button>
  </div>
  <div class="sb">
    <span>🔍</span>
    <input id="srch" placeholder="利用者を検索" type="search">
  </div>
  <div id="ab" class="ab">
    <input id="newName" placeholder="利用者名を入力" type="text">
    <button class="btn-ok" id="btnAddOk">追加</button>
    <button class="btn-no" id="btnAddNo">✕</button>
  </div>
  <div class="lst" id="pList"></div>
</div>

<!-- 画面2: 記録一覧 -->
<div id="pg2" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack1">‹</button>
    <span class="hd-ttl" id="pg2ttl"></span>
    <button class="hd-btn" id="btnGoAdd">＋</button>
  </div>
  <div id="cpb" class="cpb">
    <input type="month" id="mSel">
    <button class="btn-cp" id="btnExport">📄 報告書用出力</button>
    <button class="btn-cp-red" id="btnBulkDel">🗑 期間削除</button>
  </div>
  <div class="lst" id="rList"></div>
</div>

<!-- 画面3: 記録追加／編集 -->
<div id="pg3" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack2">‹</button>
    <span class="hd-ttl" id="pg3ttl"></span>
  </div>
  <div class="frm">
    <label class="f-lbl">日付</label>
    <input class="f-in" type="date" id="iDate">
    <label class="f-lbl">バイタル</label>
    <div class="vb">
      <div class="vr"><span class="vl">SBP：</span><input type="tel" id="iSbp"></div>
      <div class="vr"><span class="vl">DBP：</span><input type="tel" id="iDbp"></div>
      <div class="vr"><span class="vl">SpO2：</span><input type="tel" id="iSpo2"></div>
      <div class="vr"><span class="vl">PR：</span><input type="tel" id="iPr"></div>
    </div>
    <label class="f-lbl">様子</label>
    <textarea class="f-in" id="iMemo" rows="6"></textarea>
    <div class="mic-row">
      <button class="btn-mic" id="micBtn"><span id="micDot" class="mic-dot" style="display:none;"></span>🎤 音声入力</button>
      <span id="micStatus" class="mic-st"></span>
    </div>
    <button class="btn-sv" id="btnSave">保存</button>
  </div>
</div>

<!-- 画面4: 日別実施一覧 -->
<div id="pg4" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack4">‹</button>
    <span class="hd-ttl">日別実施一覧</span>
  </div>
  <div class="day-pick">
    <span class="day-pick-lbl">日付：</span>
    <input type="date" id="dayDate">
    <button class="day-today" id="btnDayToday">今日</button>
  </div>
  <div id="dayCount" class="day-count-bar" style="display:none;"></div>
  <div class="lst" id="dayList"></div>
</div>

<!-- 画面5: マイ辞書 -->
<div id="pg5" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack5">‹</button>
    <span class="hd-ttl">マイ辞書</span>
    <button class="hd-btn" id="btnDictAdd">＋</button>
  </div>
  <!-- 辞書専用バックアップバー -->
  <div class="dict-bar">
    <button class="btn-dict-io" id="btnDictExpFile">📤 エクスポート</button>
    <button class="btn-dict-imp" id="btnDictImpFile">📥 インポート</button>
  </div>
  <div id="dictAb" class="dict-ab">
    <div class="dict-ab-row">
      <input id="dictFrom" placeholder="よみ（例：ほこうりょうこう）" type="text">
      <span class="dict-arrow">→</span>
      <input id="dictTo" placeholder="変換後（例：歩行良好）" type="text">
    </div>
    <div class="dict-ab-btns">
      <button class="btn-ok" id="btnDictOk">追加</button>
      <button class="btn-no" id="btnDictNo">✕</button>
    </div>
  </div>
  <div class="lst" id="dictList"></div>
</div>

<!-- 確認ダイアログ -->
<div id="ov" class="ov">
  <div class="dlg">
    <p id="dlgMsg"></p>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnDlNo">キャンセル</button>
      <button class="btn-dl-ok" id="btnDlOk">削除する</button>
    </div>
  </div>
</div>

<!-- 期間削除ダイアログ -->
<div id="ov2" class="ov">
  <div class="dlg">
    <p>削除する期間を選択</p>
    <div class="dlg-rng">
      <input type="date" id="delFrom" class="f-in">
      <div class="dlg-rng-sep">〜</div>
      <input type="date" id="delTo" class="f-in">
    </div>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnRngNo">キャンセル</button>
      <button class="btn-dl-ok" id="btnRngOk">削除する</button>
    </div>
  </div>
</div>

<!-- バックアップメニュー -->
<div id="ov3" class="ov">
  <div class="dlg">
    <p>バックアップ</p>
    <div class="dlg-menu">
      <div class="sec-lbl">📖 マイ辞書</div>
      <button id="btnGoDict"><span class="ic">✏️</span>マイ辞書を編集</button>
      <button id="btnExpDictMenu"><span class="ic">📤</span>辞書をファイル保存</button>
      <button id="btnImpDictMenu"><span class="ic">📥</span>辞書をファイルから復元</button>
      <div class="sep"></div>
      <div class="sec-lbl">💾 全データ</div>
      <button id="btnExpJson"><span class="ic">📦</span>全データをファイル保存</button>
      <button id="btnImpJson"><span class="ic">📂</span>全データをファイルから復元</button>
    </div>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnMenuClose" style="flex:1;">閉じる</button>
    </div>
  </div>
</div>

<!-- 非表示ファイル入力（辞書インポート用） -->
<input type="file" id="fileDictImp" accept=".json" style="display:none">
<!-- 非表示ファイル入力（全データインポート用） -->
<input type="file" id="fileAllImp" accept=".json" style="display:none">

<div class="toast" id="toast"></div>

<script>
var curP = null;
var dlgCb = null;
var editId = null;
var dayFound = [];
var _micRec = null;
var _micListening = false;
var _micFinal = '';

// localStorage フォールバック
var _mem = {};
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return _mem[k]||null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); _mem[k]=v; } catch(e) { _mem[k]=v; } }
function lsRm(k) { try { localStorage.removeItem(k); } catch(e) {} delete _mem[k]; }

// データ
function getPs() { try { return JSON.parse(lsGet('ps')||'[]'); } catch(e){ return []; } }
function setPs(v) { lsSet('ps', JSON.stringify(v)); }
function getRs(id) { try { return JSON.parse(lsGet('rs_'+id)||'[]'); } catch(e){ return []; } }
function setRs(id,v) { lsSet('rs_'+id, JSON.stringify(v)); }
function getUserDict() { try { return JSON.parse(lsGet('userDict')||'[]'); } catch(e){ return []; } }
function setUserDict(v) { lsSet('userDict', JSON.stringify(v)); }

// ユーティリティ
function g(id) { return document.getElementById(id); }
function today() {
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function thisMonth() {
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
}
function fmtD(s) { var d=new Date(s); return (d.getMonth()+1)+'/'+(d.getDate()); }
function mLbl(s) { var d=new Date(s); return d.getFullYear()+'年'+(d.getMonth()+1)+'月'; }
function mKey(s) { var d=new Date(s); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
function toast(msg) {
  var t=g('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(function(){ t.style.display='none'; }, 2500);
}

// ─── ファイルダウンロード（iOS Safari対応）───
function downloadJson(filename, obj) {
  var json = JSON.stringify(obj, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

// ─── 辞書エクスポート（ファイル）───
function exportDictFile() {
  var ud = getUserDict();
  if (ud.length === 0) { toast('辞書が空です'); return; }

// ─── 辞書インポート（ファイル）───
function importDictFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var ud = null;
      // 辞書専用JSONの場合
      if (Array.isArray(data.userDict)) { ud = data.userDict; }
      // 全データJSONからの辞書取得も許可
      else if (Array.isArray(data)) { ud = data; }
      if (!ud || ud.length === 0) { toast('辞書データが見つかりません'); return; }
      // idがなければ自動付与
      ud = ud.map(function(e){ return { id: e.id || ''+Date.now()+Math.random(), from: e.from, to: e.to }; });
      setUserDict(ud);
      drawUserDict();
      toast('辞書を復元しました（' + ud.length + '件）');
    } catch(e) { toast('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file, 'UTF-8');
}

function correctTerms(txt) {
  txt = txt.replace(/[０-９]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); })
           .replace(/[ａ-ｚＡ-Ｚ]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
  var ud = getUserDict().slice().sort(function(a,b){ return b.from.length - a.from.length; });
  ud.forEach(function(e){
    if (txt.indexOf(e.from) !== -1) txt = txt.split(e.from).join(e.to);
  });
  var keys = Object.keys(medDict).sort(function(a,b){ return b.length - a.length; });
  keys.forEach(function(k){
    if (txt.indexOf(k) !== -1) txt = txt.split(k).join(medDict[k]);
  });
  return txt;
}

// DAP整形
function formatMemo(txt) {
  if (!txt) return '';
  txt = correctTerms(txt);
  var allLines = txt.split('\n').map(function(l){ return l.trim(); });
  var nonEmpty = allLines.filter(function(l){ return l; });
  if (nonEmpty.length === 0) return '';
  var hasMarkers = nonEmpty.some(function(l){
    return /^[・\-\*•◯○●＊]/.test(l) || /^[0-9０-９]+[\.\)）]/.test(l);
  });
  if (nonEmpty.length === 1 && !hasMarkers) return nonEmpty[0];
  var items = nonEmpty.map(function(line) {
    line = line.replace(/^[・\-\*•◯○●＊]+[\s　]*/, '');
    line = line.replace(/^[0-9０-９]+[\.\)）][\s　]*/, '');
    line = line.trim();
    line = line.replace(/[。．,、\s　]+$/, '');
    return line;
  }).filter(function(l){ return l; });
  if (items.length === 0) return '';
  function classify(item) {
    if (/(実施|施行|予定|継続|指導|依頼|説明|勧め|推奨|検討|介入|提案|指示|フォロー|確認|観察|調整|変更|中止|開始|再開)$/.test(item)) return 'P';
    if (/(良好|不良|安定|不安定|改善|悪化|増悪|維持|傾向|効果|順調|低下|上昇|回復|軽減|増強|進行|見られる|見られず|認められる|認められず|認める|認めず)$/.test(item)) return 'A';
    return 'D';
  }
  var D = [], A = [], P = [];
  items.forEach(function(item) {
    var c = classify(item);
    if (c === 'D') D.push(item);
    else if (c === 'A') A.push(item);
    else P.push(item);
  });
  var P_sorted = P.filter(function(i){ return !/予定$/.test(i); })
                  .concat(P.filter(function(i){ return /予定$/.test(i); }));
  var ordered = D.concat(A).concat(P_sorted);
  function naturalize(item, isLast) {
    if (/[はをがにで]/.test(item)) return item;
    var m;
    if ((m = item.match(/^(.+?)なし$/))) return m[1] + (isLast ? 'は認めず' : 'なく');
    if ((m = item.match(/^(.+?)あり$/))) return m[1] + 'あり';
    if ((m = item.match(/^(.+?)訴え$/))) return m[1] + (isLast ? 'の訴えあり' : 'の訴えがあり');
    var patterns = [
      { re:/^(.+?)実施$/, mid:'を実施し', end:'を実施した' },
      { re:/^(.+?)施行$/, mid:'を施行し', end:'を施行した' },
      { re:/^(.+?)確認$/, mid:'を確認し', end:'を確認した' },
      { re:/^(.+?)観察$/, mid:'を観察し', end:'を観察した' },
      { re:/^(.+?)調整$/, mid:'を調整し', end:'を調整した' },
      { re:/^(.+?)開始$/, mid:'を開始し', end:'を開始した' },
      { re:/^(.+?)再開$/, mid:'を再開し', end:'を再開した' },
      { re:/^(.+?)中止$/, mid:'を中止し', end:'を中止した' },
      { re:/^(.+?)変更$/, mid:'を変更し', end:'を変更した' },
      { re:/^(.+?)継続$/, mid:'を継続し', end:'を継続中' },
      { re:/^(.+?)指導$/, mid:'指導を実施し', end:'指導を実施した' },
      { re:/^(.+?)説明$/, mid:'について説明し', end:'について説明した' },
      { re:/^(.+?)予定$/, mid:'予定であり', end:'予定' },
      { re:/^(.+?)良好$/, mid:'は良好で', end:'は良好' },
      { re:/^(.+?)不良$/, mid:'は不良で', end:'は不良' },
      { re:/^(.+?)順調$/, mid:'は順調で', end:'は順調' },
      { re:/^(.+?)不安定$/, mid:'は不安定で', end:'は不安定' },
      { re:/^(.+?)安定$/, mid:'は安定しており', end:'は安定している' },
      { re:/^(.+?)改善$/, mid:'は改善しており', end:'は改善している' },
      { re:/^(.+?)悪化$/, mid:'は悪化しており', end:'は悪化している' },
      { re:/^(.+?)増悪$/, mid:'は増悪しており', end:'は増悪している' },
      { re:/^(.+?)維持$/, mid:'は維持されており', end:'は維持されている' },
      { re:/^(.+?)低下$/, mid:'は低下しており', end:'は低下している' },
      { re:/^(.+?)上昇$/, mid:'は上昇しており', end:'は上昇している' },
      { re:/^(.+?)軽減$/, mid:'は軽減しており', end:'は軽減している' },
      { re:/^(.+?)増強$/, mid:'は増強しており', end:'は増強している' },
      { re:/^(.+?)回復$/, mid:'は回復しており', end:'は回復している' },
      { re:/^(.+?)進行$/, mid:'は進行しており', end:'は進行している' }
    ];
    for (var i = 0; i < patterns.length; i++) {
      var p = patterns[i];
      var mp = item.match(p.re);
      if (mp) return mp[1] + (isLast ? p.end : p.mid);
    }
    return item;
  }
  var parts = ordered.map(function(item, i) {
    return naturalize(item, i === ordered.length - 1);
  });
  return parts.join('、') + '。';
}

    var card = document.createElement('div'); card.className='day-user-card';
    var hd = document.createElement('div'); hd.className='day-user-hd';
    hd.innerHTML='<div class="day-user-av">'+item.p.n[0]+'</div><div class="day-user-nm">'+item.p.n+'</div>';
    card.appendChild(hd);
    var rec = document.createElement('div'); rec.className='day-rec';
    var vt = document.createElement('div'); vt.className='day-vt';
    vt.innerHTML = (item.r.v||'').replace(/\n/g,'<br>');
    rec.appendChild(vt);
    if(item.r.m) {
      var mo = document.createElement('div'); mo.className='day-mo';
      mo.textContent='様子：'+item.r.m;
      rec.appendChild(mo);
    }
    card.appendChild(rec);
    el.appendChild(card);
  });
}

// クリップボードコピー
function copyText(txt, okMsg) {
  if(navigator.clipboard && location.protocol !== 'file:'){
    navigator.clipboard.writeText(txt).then(function(){ toast(okMsg); });
  } else {
    var ta=document.createElement('textarea');
    ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); toast(okMsg); }
    catch(e) { toast('コピーできませんでした'); }
    document.body.removeChild(ta);
  }
}

// 報告書用エクスポート
function doExport() {
  var month = g('mSel').value;
  if(!month) { toast('月を選択してください'); return; }
  var rs = getRs(curP.id);
  var recs = rs.filter(function(r){ return mKey(r.d) === month; })
               .sort(function(a,b){ return a.d.localeCompare(b.d); });
  if(recs.length === 0) { toast(month + 'の記録はありません'); return; }
  var mLabel = month.substring(0,4)+'年'+parseInt(month.substring(5,7),10)+'月';
  var txt = '【利用者】' + curP.n + '\n';
  txt += '【対象月】' + mLabel + '\n';
  txt += '【訪問回数】' + recs.length + '回\n\n';
  recs.forEach(function(r, i) {
    txt += '■ 第' + (i+1) + '回訪問（' + fmtD(r.d) + '）\n';
    txt += (r.v || '') + '\n';
    txt += '様子：' + (r.m || '記録なし') + '\n\n';
  });
  copyText(txt, '報告書用テキストをコピーしました');
}

// 音声入力
function initSpeech() {
  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  var micBtn = g('micBtn');
  var micSt = g('micStatus');
  var micDot = g('micDot');
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    micBtn.addEventListener('click', function() {
      g('iMemo').focus();
      toast('キーボードの🎤で音声入力 → フォーカスを外すと自動変換されます');
    });
    g('iMemo').addEventListener('blur', function() {
      var v = g('iMemo').value;
      var c = correctTerms(v);
      if (c !== v) { g('iMemo').value = c; toast('医療用語を変換しました'); }
    });
    return;
  }
  if (!SpeechRec) { micBtn.style.display = 'none'; return; }
  var rec = new SpeechRec();
  rec.lang = 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;
  _micRec = rec;
  micBtn.addEventListener('click', function() {
    if (_micListening) { rec.stop(); return; }
    _micFinal = g('iMemo').value ? g('iMemo').value + '\n' : '';
    try { rec.start(); } catch(e) { toast('マイクを起動できません'); }
  });
  rec.onstart = function() {
    _micListening = true;
    micDot.style.display = 'inline-block';
    micBtn.classList.add('rec');
    micBtn.childNodes[micBtn.childNodes.length-1].textContent = ' 停止';
    micSt.textContent = '認識中…';
  };
  rec.onresult = function(e) {
    var interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) { _micFinal += correctTerms(t); }
      else { interim = t; }
    }
    g('iMemo').value = _micFinal + interim;
    g('iMemo').scrollTop = g('iMemo').scrollHeight;
  };
  rec.onend = function() {
    _micListening = false;
    micDot.style.display = 'none';
    micBtn.classList.remove('rec');
    micBtn.childNodes[micBtn.childNodes.length-1].textContent = ' 音声入力';
    micSt.textContent = '';
    g('iMemo').value = correctTerms(g('iMemo').value);
  };
  rec.onerror = function(e) {
    _micListening = false;
    micDot.style.display = 'none';
    micBtn.classList.remove('rec');
    micBtn.childNodes[micBtn.childNodes.length-1].textContent = ' 音声入力';
    micSt.textContent = '';
    if (e.error !== 'no-speech') toast('音声エラー: ' + e.error);
  };
}
