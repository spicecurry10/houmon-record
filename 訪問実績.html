<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="訪問記録">
<title>訪問記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#2E7D32;--gl:#E8F5E9;--red:#FF6B6B;--tx:#1A1A2E;--sub:#6B7280;--bd:#E5E7EB;--bg:#F5F7FA;--bl:#1565C0;--bll:#E3F2FD;}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--tx);max-width:430px;margin:0 auto;min-height:100vh;}
.pg{display:none;flex-direction:column;min-height:100vh;}
.pg.on{display:flex;}
.hd{background:var(--g);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hd-ttl{flex:1;font-size:18px;font-weight:700;}
.hd-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.bk-btn{background:transparent;border:none;color:#fff;font-size:30px;cursor:pointer;padding:0 4px;font-family:inherit;line-height:1;}
.sb{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--bd);}
.sb input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;}
.ab{display:none;gap:8px;padding:12px 16px;background:var(--gl);border-bottom:1px solid var(--bd);}
.ab input{flex:1;border:1.5px solid var(--g);border-radius:8px;padding:8px 12px;font-size:16px;outline:none;font-family:inherit;}
.btn-ok{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-no{background:transparent;color:var(--sub);border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;}
.lst{padding:8px 16px 80px;}
.empty{text-align:center;color:var(--sub);margin-top:80px;font-size:15px;padding:16px;}
.p-row{display:flex;align-items:center;margin-bottom:10px;gap:8px;}
.p-btn{flex:1;display:flex;align-items:center;gap:12px;background:#fff;border:none;border-radius:12px;padding:14px 16px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:left;font-family:inherit;}
.av{width:40px;height:40px;border-radius:20px;background:var(--g);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.p-nm{flex:1;font-size:16px;font-weight:600;color:var(--tx);}
.chv{font-size:22px;color:var(--sub);}
.d-btn{background:transparent;border:none;font-size:18px;cursor:pointer;padding:8px;color:var(--sub);}
.cpb{display:none;flex-wrap:wrap;gap:8px;padding:10px 16px;background:var(--gl);border-bottom:1px solid var(--bd);align-items:center;}
.cpb select{flex:1;min-width:100px;border:1.5px solid var(--g);border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;color:var(--tx);outline:none;font-family:inherit;}
.btn-cp{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn-cp-red{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.m-lbl{font-size:12px;font-weight:700;color:var(--sub);padding:12px 0 6px;}
.r-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.r-dt{font-size:16px;font-weight:700;color:var(--g);margin-bottom:8px;}
.r-vt{font-size:13px;color:var(--tx);line-height:1.9;}
.r-mo-row{display:flex;align-items:flex-start;gap:8px;margin-top:6px;padding-top:8px;border-top:1px solid var(--bd);}
.r-mo{font-size:13px;color:var(--tx);line-height:1.6;flex:1;}
.r-cp{background:#E8F5E9;border:2px solid var(--g);color:var(--g);font-size:13px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:8px;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.r-acts{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);}
.r-edit{background:#EFF6FF;border:2px solid #2563EB;color:#2563EB;font-size:15px;font-weight:700;cursor:pointer;padding:10px 0;border-radius:10px;font-family:inherit;flex:1;}
.r-del{background:#FEF2F2;border:2px solid #EF4444;color:#EF4444;font-size:15px;font-weight:700;cursor:pointer;padding:10px 0;border-radius:10px;font-family:inherit;flex:1;}.frm{padding:20px 16px;display:flex;flex-direction:column;gap:6px;}
.f-lbl{font-size:13px;font-weight:700;color:var(--sub);margin-top:10px;}
.f-in{border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:15px;background:#fff;outline:none;color:var(--tx);font-family:inherit;width:100%;}
.vb{background:#fff;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;}
.vr{display:flex;align-items:center;border-bottom:1px solid var(--bd);padding:0 14px;}
.vr:last-child{border-bottom:none;}
.vl{font-size:15px;font-weight:700;color:var(--g);width:70px;flex-shrink:0;}
.vr input{flex:1;border:none;outline:none;font-size:16px;padding:12px 0;background:transparent;color:var(--tx);font-family:inherit;}
textarea.f-in{resize:none;line-height:1.7;}
.btn-sv{background:var(--g);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;width:100%;font-family:inherit;box-shadow:0 4px 12px rgba(46,125,50,.35);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;}
.ov.on{display:flex;}
.dlg{background:#fff;border-radius:16px;padding:24px 20px 20px;width:85%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.dlg p{font-size:16px;font-weight:600;text-align:center;margin-bottom:20px;line-height:1.6;}
.dlg-bts{display:flex;gap:10px;}
.btn-dl-no{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-dl-ok{flex:1;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.dlg-rng{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.dlg-rng-sep{text-align:center;color:var(--sub);font-size:13px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;display:none;}
.hd-btn-cal{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.day-pick{padding:12px 16px;background:#fff;border-bottom:2px solid var(--g);display:flex;align-items:center;gap:10px;}
.day-pick input[type=date]{flex:1;border:1.5px solid var(--g);border-radius:10px;padding:9px 12px;font-size:16px;outline:none;font-family:inherit;color:var(--tx);background:#fff;}
.day-pick-lbl{font-size:13px;color:var(--sub);font-weight:700;white-space:nowrap;}
.day-today{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.day-empty{text-align:center;color:var(--sub);margin-top:80px;font-size:15px;padding:16px;}
.day-user-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.day-user-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--gl);border-bottom:1px solid var(--bd);}
.day-user-av{width:36px;height:36px;border-radius:18px;background:var(--g);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-user-nm{font-size:16px;font-weight:700;color:var(--tx);}
.day-rec{padding:12px 16px;}
.day-vt{font-size:13px;color:var(--tx);line-height:1.9;}
.day-mo{font-size:13px;color:var(--tx);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);}
.day-count-bar{padding:8px 16px 4px;font-size:13px;font-weight:700;color:var(--bl);background:var(--bll);border-bottom:1px solid var(--bd);}
.p-badge{background:var(--g);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;margin-right:4px;white-space:nowrap;}
.p-btn.done{background:var(--gl);}
.cpb input[type=month]{flex:1;min-width:140px;border:1.5px solid var(--g);border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;color:var(--tx);outline:none;font-family:inherit;}
.dlg-menu{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.dlg-menu button{background:#fff;border:1.5px solid var(--g);color:var(--g);font-size:15px;font-weight:700;padding:14px;border-radius:10px;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:10px;}
.dlg-menu button:hover{background:var(--gl);}
.dlg-menu .ic{font-size:20px;}
.bulk-in{border:1.5px dashed var(--g);border-radius:10px;padding:10px 14px;font-size:15px;background:var(--gl);outline:none;color:var(--tx);font-family:inherit;width:100%;margin-bottom:8px;}
.bulk-in::placeholder{color:#7a9c7d;font-size:13px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{background:var(--gl);border:1.5px solid var(--g);color:var(--g);font-size:13px;font-weight:600;padding:6px 12px;border-radius:16px;cursor:pointer;font-family:inherit;}
.chip:active{background:var(--g);color:#fff;}
</style>
</head>
<body>

<!-- 画面1: 利用者一覧 -->
<div id="pg1" class="pg on">
  <div class="hd">
    <span class="hd-ttl">訪問記録</span>
    <button class="hd-btn-cal" id="btnSettings" title="バックアップ">⚙</button>
    <button class="hd-btn-cal" id="btnGoDay" title="日別実施一覧">📅</button>
    <button class="hd-btn" id="btnShowAb">＋</button>
  </div>
  <div class="sb">
    <span>🔍</span>
    <input id="srch" placeholder="利用者を検索" type="search">
  </div>
  <div id="ab" class="ab">
    <input id="newName" placeholder="利用者名を入力" type="text">
    <button class="btn-ok" id="btnAddOk">追加</button>
    <button class="btn-no" id="btnAddNo">✕</button>
  </div>
  <div class="lst" id="pList"></div>
</div>

<!-- 画面2: 記録一覧 -->
<div id="pg2" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack1">‹</button>
    <span class="hd-ttl" id="pg2ttl"></span>
    <button class="hd-btn" id="btnGoAdd">＋</button>
  </div>
  <div id="cpb" class="cpb">
    <input type="month" id="mSel">
    <button class="btn-cp" id="btnExport">📄 報告書用出力</button>
    <button class="btn-cp-red" id="btnBulkDel">🗑 期間削除</button>
  </div>
  <div class="lst" id="rList"></div>
</div>

<!-- 画面3: 記録追加／編集 -->
<div id="pg3" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack2">‹</button>
    <span class="hd-ttl" id="pg3ttl"></span>
  </div>
  <div class="frm">
    <label class="f-lbl">日付</label>
    <input class="f-in" type="date" id="iDate">
    <label class="f-lbl">バイタル</label>
    <input type="text" class="bulk-in" id="iBulk" inputmode="text" placeholder="一括入力例：120/80 98 72（SBP DBP SpO2 PR）">
    <div class="vb">
      <div class="vr"><span class="vl">SBP：</span><input type="tel" id="iSbp"></div>
      <div class="vr"><span class="vl">DBP：</span><input type="tel" id="iDbp"></div>
      <div class="vr"><span class="vl">SpO2：</span><input type="tel" id="iSpo2"></div>
      <div class="vr"><span class="vl">PR：</span><input type="tel" id="iPr"></div>
    </div>
    <label class="f-lbl">様子</label>
    <div class="chips" id="chips"></div>
    <textarea class="f-in" id="iMemo" rows="5" placeholder="訪問時の様子・特記事項"></textarea>
    <button class="btn-sv" id="btnSave">保存</button>
  </div>
</div>

<!-- 画面4: 日別実施一覧 -->
<div id="pg4" class="pg">
  <div class="hd">
    <button class="bk-btn" id="btnBack4">‹</button>
    <span class="hd-ttl">日別実施一覧</span>
  </div>
  <div class="day-pick">
    <span class="day-pick-lbl">日付：</span>
    <input type="date" id="dayDate">
    <button class="day-today" id="btnDayToday">今日</button>
  </div>
  <div id="dayCount" class="day-count-bar" style="display:none;"></div>
  <div class="lst" id="dayList"></div>
</div>

<!-- 確認ダイアログ -->
<div id="ov" class="ov">
  <div class="dlg">
    <p id="dlgMsg"></p>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnDlNo">キャンセル</button>
      <button class="btn-dl-ok" id="btnDlOk">削除する</button>
    </div>
  </div>
</div>

<!-- 期間削除ダイアログ -->
<div id="ov2" class="ov">
  <div class="dlg">
    <p>削除する期間を選択</p>
    <div class="dlg-rng">
      <input type="date" id="delFrom" class="f-in">
      <div class="dlg-rng-sep">〜</div>
      <input type="date" id="delTo" class="f-in">
    </div>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnRngNo">キャンセル</button>
      <button class="btn-dl-ok" id="btnRngOk">削除する</button>
    </div>
  </div>
</div>

<!-- バックアップ／復元ダイアログ -->
<div id="ov3" class="ov">
  <div class="dlg">
    <p>データのバックアップ</p>
    <div class="dlg-menu">
      <button id="btnExpAll"><span class="ic">📥</span>データを保存（JSONダウンロード）</button>
      <button id="btnImpAll"><span class="ic">📤</span>データを読み込む（JSONから復元）</button>
    </div>
    <div class="dlg-bts">
      <button class="btn-dl-no" id="btnSetClose">閉じる</button>
    </div>
  </div>
</div>
<input type="file" id="impFile" accept="application/json,.json" style="display:none;">

<div class="toast" id="toast"></div>

<script>
var curP = null;
var dlgCb = null;
var editId = null;

// localStorage フォールバック
var _mem = {};
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return _mem[k]||null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); _mem[k]=v; } catch(e) { _mem[k]=v; } }
function lsRm(k) { try { localStorage.removeItem(k); } catch(e) {} delete _mem[k]; }

// データ
function getPs() { try { return JSON.parse(lsGet('ps')||'[]'); } catch(e){ return []; } }
function setPs(v) { lsSet('ps', JSON.stringify(v)); }
function getRs(id) { try { return JSON.parse(lsGet('rs_'+id)||'[]'); } catch(e){ return []; } }
function setRs(id,v) { lsSet('rs_'+id, JSON.stringify(v)); }

// ユーティリティ
function g(id) { return document.getElementById(id); }
function today() {
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function fmtD(s) { var d=new Date(s); return (d.getMonth()+1)+'/'+(d.getDate()); }
function mLbl(s) { var d=new Date(s); return d.getFullYear()+'年'+(d.getMonth()+1)+'月'; }
function toast(msg) {
  var t=g('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(function(){ t.style.display='none'; }, 2500);
}

// 画面切替
function go(n, opt) {
  ['pg1','pg2','pg3','pg4'].forEach(function(id){ g(id).className='pg'; });
  g('pg'+n).className='pg on';
  window.scrollTo(0,0);
  if(n===1) drawPs();
  if(n===2) drawRs();
  if(n===3) initForm(opt);
  if(n===4) drawDay();
}

// 利用者一覧描画（50音順）
function drawPs() {
  var q=g('srch').value;
  var all=getPs();
  var td=today();
  all.sort(function(a,b){ return a.n.localeCompare(b.n, 'ja'); });
  var ps=all.filter(function(p){ return p.n.indexOf(q)!==-1; });
  var el=g('pList');
  el.innerHTML='';
  if(all.length===0){ el.innerHTML='<div class="empty">＋ボタンで利用者を追加</div>'; return; }
  if(ps.length===0){ el.innerHTML='<div class="empty">「'+q+'」に一致する利用者はいません</div>'; return; }
  ps.forEach(function(p){
    var rs=getRs(p.id);
    var done=rs.some(function(r){ return r.d===td; });
    var row=document.createElement('div'); row.className='p-row';
    var btn=document.createElement('button'); btn.className='p-btn'+(done?' done':'');
    var badge=done?'<span class="p-badge">✓本日</span>':'';
    btn.innerHTML='<span class="av">'+p.n[0]+'</span><span class="p-nm">'+p.n+'</span>'+badge+'<span class="chv">›</span>';
    btn.setAttribute('data-id', p.id);
    var del=document.createElement('button'); del.className='d-btn'; del.textContent='🗑';
    del.setAttribute('data-id', p.id);
    row.appendChild(btn); row.appendChild(del);
    el.appendChild(row);
  });
}

// 利用者追加
function addP() {
  var nm=g('newName').value.trim(); if(!nm) return;
  var ps=getPs(); ps.push({id:''+Date.now(), n:nm}); setPs(ps);
  g('ab').style.display='none'; g('newName').value=''; drawPs();
}

// 記録一覧描画
function drawRs() {
  if(!curP) return;
  var rs=getRs(curP.id);
  var el=g('rList'); el.innerHTML='';
  var groups={};
  rs.forEach(function(r){ var m=mLbl(r.d); if(!groups[m]) groups[m]=[]; groups[m].push(r); });
  var months=Object.keys(groups).sort(function(a,b){ return b.localeCompare(a); });
  var cpb=g('cpb'), ms=g('mSel');
  if(rs.length>0){
    cpb.style.display='flex';
    var sorted=rs.slice().sort(function(a,b){ return b.d.localeCompare(a.d); });
    ms.value=sorted[0].d.substring(0,7);
  } else {
    cpb.style.display='none';
    ms.value=today().substring(0,7);
  }
  if(rs.length===0){ el.innerHTML='<div class="empty">＋ボタンで記録を追加</div>'; return; }
  months.forEach(function(m){
    var lbl=document.createElement('div'); lbl.className='m-lbl'; lbl.textContent=m; el.appendChild(lbl);
    var sorted=groups[m].slice().sort(function(a,b){ return b.d.localeCompare(a.d); });
    sorted.forEach(function(r){
      var c=document.createElement('div'); c.className='r-card';
      var dt=document.createElement('div'); dt.className='r-dt'; dt.textContent=fmtD(r.d);
      var vt=document.createElement('div'); vt.className='r-vt'; vt.innerHTML=(r.v||'').replace(/\n/g,'<br>');
      c.appendChild(dt); c.appendChild(vt);
      if(r.m){
        var moRow=document.createElement('div'); moRow.className='r-mo-row';
        var mo=document.createElement('div'); mo.className='r-mo'; mo.textContent='様子：'+r.m;
        var cpb=document.createElement('button'); cpb.className='r-cp'; cpb.textContent='コピー'; cpb.setAttribute('data-cp', r.m);
        moRow.appendChild(mo); moRow.appendChild(cpb);
        c.appendChild(moRow);
      }
      var acts=document.createElement('div'); acts.className='r-acts';
      var eb=document.createElement('button'); eb.className='r-edit'; eb.textContent='編集'; eb.setAttribute('data-rid', r.id);
      var db=document.createElement('button'); db.className='r-del'; db.textContent='削除'; db.setAttribute('data-rid', r.id);
      acts.appendChild(eb); acts.appendChild(db);
      c.appendChild(acts); el.appendChild(c);
    });
  });
}

// バイタル一括入力パース
function parseBulk() {
  var v = g('iBulk').value;
  if(!v) return;
  // 全角数字→半角
  v = v.replace(/[０-９]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
  var nums = v.match(/\d+/g);
  if(!nums) return;
  if(nums[0]!==undefined) g('iSbp').value  = nums[0];
  if(nums[1]!==undefined) g('iDbp').value  = nums[1];
  if(nums[2]!==undefined) g('iSpo2').value = nums[2];
  if(nums[3]!==undefined) g('iPr').value   = nums[3];
}

// 頻出フレーズ抽出（全利用者の様子から）
function getFreqPhrases() {
  var counts = {};
  var ps = getPs();
  ps.forEach(function(p){
    var rs = getRs(p.id);
    rs.forEach(function(r){
      if(!r.m) return;
      var parts = r.m.split(/[。\n、]/);
      parts.forEach(function(s){
        s = s.trim();
        if(s.length >= 2 && s.length <= 20) {
          counts[s] = (counts[s]||0) + 1;
        }
      });
    });
  });
  var arr = Object.keys(counts).map(function(k){ return {t:k, c:counts[k]}; });
  arr.sort(function(a,b){ return b.c - a.c; });
  return arr.slice(0, 8);
}

// チップ描画
function drawChips() {
  var el = g('chips');
  el.innerHTML = '';
  var ph = getFreqPhrases();
  if(ph.length === 0) { el.style.display='none'; return; }
  el.style.display='flex';
  ph.forEach(function(p){
    var c = document.createElement('button');
    c.type = 'button';
    c.className = 'chip';
    c.textContent = p.t;
    c.setAttribute('data-txt', p.t);
    el.appendChild(c);
  });
}

// フォーム初期化（編集時はレコードを渡す）
function initForm(r) {
  g('iBulk').value = '';
  drawChips();
  if(r) {
    editId = r.id;
    g('pg3ttl').textContent = curP.n + '　記録編集';
    g('btnSave').textContent = '更新';
    g('iDate').value = r.d;
    var vLines = (r.v||'').split('\n');
    g('iSbp').value = (vLines[0]||'').replace('SBP：','');
    g('iDbp').value = (vLines[1]||'').replace('DBP：','');
    g('iSpo2').value = (vLines[2]||'').replace('SpO2：','');
    g('iPr').value = (vLines[3]||'').replace('PR：','');
    g('iMemo').value = r.m || '';
  } else {
    editId = null;
    g('pg3ttl').textContent = curP.n + '　記録追加';
    g('btnSave').textContent = '保存';
    g('iDate').value = today();
    // 前回値を自動入力（バイタルのみ。様子は引き継がない）
    var rsAll = getRs(curP.id);
    if(rsAll.length > 0) {
      var last = rsAll.slice().sort(function(a,b){ return b.d.localeCompare(a.d); })[0];
      var vL = (last.v||'').split('\n');
      g('iSbp').value  = (vL[0]||'').replace('SBP：','');
      g('iDbp').value  = (vL[1]||'').replace('DBP：','');
      g('iSpo2').value = (vL[2]||'').replace('SpO2：','');
      g('iPr').value   = (vL[3]||'').replace('PR：','');
    } else {
      g('iSbp').value=''; g('iDbp').value=''; g('iSpo2').value=''; g('iPr').value='';
    }
    g('iMemo').value='';
  }
}

// 保存／更新
function saveR() {
  if(!curP) return;
  var isEdit = !!editId;
  var newR = {
    id: editId || ''+Date.now(),
    d: g('iDate').value,
    v: 'SBP：'+g('iSbp').value+'\nDBP：'+g('iDbp').value+'\nSpO2：'+g('iSpo2').value+'\nPR：'+g('iPr').value,
    m: g('iMemo').value
  };
  var rs = getRs(curP.id);
  if(isEdit) {
    rs = rs.map(function(r){ return r.id === newR.id ? newR : r; });
  } else {
    rs = [newR].concat(rs);
  }
  setRs(curP.id, rs);
  editId = null;
  go(2); toast(isEdit ? '更新しました' : '保存しました');
}

// 期間削除
function doBulkDelete() {
  var from = g('delFrom').value;
  var to = g('delTo').value;
  if(!from || !to) { toast('期間を選択してください'); return; }
  if(from > to) { toast('開始日が終了日より後になっています'); return; }
  var rs = getRs(curP.id);
  var deleted = 0;
  var newRs = rs.filter(function(r) {
    if(r.d >= from && r.d <= to) { deleted++; return false; }
    return true;
  });
  setRs(curP.id, newRs);
  g('ov2').className = 'ov';
  drawRs();
  toast(deleted + '件削除しました');
}

// 日別実施一覧描画
function drawDay() {
  var dt = g('dayDate').value;
  var el = g('dayList');
  var cntEl = g('dayCount');
  el.innerHTML = '';
  if(!dt) { cntEl.style.display='none'; el.innerHTML='<div class="day-empty">日付を選択してください</div>'; return; }
  var ps = getPs();
  var found = [];
  ps.forEach(function(p) {
    var rs = getRs(p.id);
    rs.forEach(function(r) {
      if(r.d === dt) found.push({p:p, r:r});
    });
  });
  found.sort(function(a,b){ return a.p.n.localeCompare(b.p.n,'ja'); });
  if(found.length === 0) {
    cntEl.style.display='none';
    var d=new Date(dt); var lbl=(d.getMonth()+1)+'月'+d.getDate()+'日';
    el.innerHTML='<div class="day-empty">'+lbl+'の記録はありません</div>';
    return;
  }
  cntEl.style.display='block';
  var d2=new Date(dt); var lbl2=(d2.getMonth()+1)+'月'+d2.getDate()+'日';
  cntEl.textContent = lbl2 + '　訪問：'+found.length+'件';
  found.forEach(function(item) {
    var card = document.createElement('div'); card.className='day-user-card';
    var hd = document.createElement('div'); hd.className='day-user-hd';
    hd.innerHTML='<div class="day-user-av">'+item.p.n[0]+'</div><div class="day-user-nm">'+item.p.n+'</div>';
    card.appendChild(hd);
    var rec = document.createElement('div'); rec.className='day-rec';
    var vt = document.createElement('div'); vt.className='day-vt';
    vt.innerHTML = (item.r.v||'').replace(/\n/g,'<br>');
    rec.appendChild(vt);
    if(item.r.m) {
      var mo = document.createElement('div'); mo.className='day-mo';
      mo.textContent='様子：'+item.r.m;
      rec.appendChild(mo);
    }
    card.appendChild(rec);
    el.appendChild(card);
  });
}

// 報告書用エクスポート
function doExport() {
  var ym = g('mSel').value; // "YYYY-MM"
  if(!ym) { toast('月を選択してください'); return; }
  var rs = getRs(curP.id);
  var recs = rs.filter(function(r){ return r.d.substring(0,7) === ym; })
                .slice().sort(function(a,b){ return a.d.localeCompare(b.d); });
  if(recs.length === 0) { toast('この月の記録はありません'); return; }
  var parts = ym.split('-');
  var monthLbl = parts[0] + '年' + parseInt(parts[1],10) + '月';
  var txt = '【利用者】' + curP.n + '\n';
  txt += '【対象月】' + monthLbl + '\n';
  txt += '【訪問回数】' + recs.length + '回\n\n';
  recs.forEach(function(r, i) {
    txt += '■ 第' + (i+1) + '回訪問（' + fmtD(r.d) + '）\n';
    txt += (r.v || '') + '\n';
    txt += '様子：' + (r.m || '記録なし') + '\n\n';
  });
  if(navigator.clipboard && location.protocol !== 'file:'){
    navigator.clipboard.writeText(txt).then(function(){ toast('報告書用テキストをコピーしました'); });
  } else {
    var ta=document.createElement('textarea');
    ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); toast('報告書用テキストをコピーしました'); }
    catch(e) { toast('コピーできませんでした'); }
    document.body.removeChild(ta);
  }
}

// バックアップ／復元
function exportAll() {
  var ps = getPs();
  var data = { v:1, exportedAt: new Date().toISOString(), ps: ps, rs: {} };
  ps.forEach(function(p){ data.rs[p.id] = getRs(p.id); });
  var json = JSON.stringify(data, null, 2);
  try {
    var blob = new Blob([json], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '訪問記録_'+today()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    toast('バックアップを保存しました');
  } catch(e) {
    toast('保存に失敗しました');
  }
}

function importAll(file) {
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if(!data.ps || !Array.isArray(data.ps) || !data.rs) throw new Error('形式不正');
      showDlg('現在のデータを上書きします。よろしいですか？', function(){
        setPs(data.ps);
        Object.keys(data.rs).forEach(function(id){ setRs(id, data.rs[id]); });
        g('ov3').className='ov';
        drawPs();
        toast('データを復元しました（'+data.ps.length+'名）');
      });
    } catch(err) {
      toast('読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
}
